<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Calculator</title>
    <link href="./styles.css" rel="stylesheet" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header></header>
    <main>
      <div id="calc">
        <div id="calcDisplay">
          <div class="numDisplay" id="calcResult">0</div>
          <div class="numDisplay" id="calcInput">0</div>
        </div>
        <div class="buttonContainer">
          <div id="numButtons"></div>
          <div id="opButtons">
            <button class="opButton" id="multButton">X</button>
            <button class="opButton" id="divideButton">/</button>
            <button class="opButton" id="addButton">+</button>
            <button class="opButton" id="subButton">-</button>
            <button class="opButton" id="AC">AC</button>
            <button class="opButton" id="del">DEL</button>
            <button class="opButton" id="exec">EXE</button>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
