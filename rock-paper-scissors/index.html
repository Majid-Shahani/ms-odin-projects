<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rock Paper Scissors</title>
    <script src="./script.js" defer></script>
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <h1 class="title">Play Rock Paper Scissors!</h1>
    <div class="container">
      <div class="card">
        <div class="label">Human Score:</div>
        <div id="hScore">0</div>
      </div>
      <div class="card">
        <div class="label">Computer Score:</div>
        <div id="cScore">0</div>
      </div>
    </div>
    <div id="roundResult"></div>
    <div class="buttons">
      <button id="rock">Rock!</button>
      <button id="paper">Paper!</button>
      <button id="scissor">Scissors!</button>
    </div>
  </body>
</html>
