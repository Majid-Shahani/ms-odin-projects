<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link href="./styles.css" rel="stylesheet">
</head>
<body>
    <div class="welcome">
        <div class="header">
            <div class="logo">
                logo
            </div>
            <div class="links">
                <ul>
                    <li>link 1</li>
                    <li>link 2</li>
                    <li>link 3</li>
                </ul>
            </div>
        </div>
        <div class="front">
            <div class="web-info">
                <div class="title">
                    <strong>awesome</strong>
                </div>
                <div class="text">
                    this website is not at all awesome.
                </div>
                <button>Sign up</button>
            </div>
            <img src="" alt="image-placeholder">
        </div>
    </div>
    <div class="info">
        <div class="title">Some random information.</div>
        <div class="cards">
            <div class="card">
                <img src="" alt="card1">
                <div class="text">
                    subtext on card1.
                </div>
            </div>
            <div class="card">
                <img src="" alt="card2">
                <div class="text">
                    subtext on card2.
                </div>
            </div>
            <div class="card">
                <img src="" alt="card3">
                <div class="text">
                    subtext on card3.
                </div>
            </div>
        </div>
    </div>
    <div class="quotes">
        <div class="quote">read this.</div>
        <div class="author">me</div>
    </div>
    <div class="action">
        <div class="call">
            <div class="left">
                <div class="title">it's time</div>
                <div class="text">buy my stuff</div>
            </div>
            <div class="right">
                <button>buy now</button>
            </div>
        </div>
    </div>
    <div class="footer">copyleft</div>
</body>
</html>
